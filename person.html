<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Person Tasks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f5f7;
      --bg-elevated: #ffffff;
      --bg-card: #f9fafb;
      --border-subtle: rgba(148, 163, 184, 0.35);
      --border-strong: rgba(148, 163, 184, 0.6);
      --text-main: #0f172a;
      --text-soft: #6b7280;
      --accent: #4f46e5;
      --success: #16a34a;
      --warning: #eab308;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background:
        radial-gradient(circle at top, rgba(79, 70, 229, 0.05), transparent 55%),
        radial-gradient(circle at bottom, rgba(37, 99, 235, 0.04), transparent 55%),
        var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 40px;
    }

    .shell {
      width: 100%;
      max-width: 960px;
      border-radius: 20px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
      box-shadow:
        0 18px 35px rgba(15, 23, 42, 0.08);
      padding: 20px 20px 18px;
      position: relative;
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 18px;
      align-items: flex-start;
    }

    .sidebar-nav {
      border-radius: 16px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-card);
      padding: 10px 10px 8px;
      font-size: 12px;
      color: var(--text-soft);
    }

    .sidebar-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 8px;
      color: var(--text-soft);
    }

    .nav-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 12px;
      color: var(--text-soft);
      text-decoration: none;
      background: transparent;
      cursor: pointer;
      transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease, transform 80ms ease;
    }

    .nav-link span.dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      opacity: 0.65;
    }

    .nav-link:hover {
      background: #eef2ff;
      border-color: rgba(129, 140, 248, 0.7);
      color: #312e81;
      transform: translateY(-1px);
    }

    .nav-link.active {
      background: #e0e7ff;
      border-color: rgba(79, 70, 229, 0.9);
      color: #1e1b4b;
    }

    .main-column {
      min-width: 0;
    }

    .breadcrumbs {
      font-size: 11px;
      color: var(--text-soft);
      margin-bottom: 8px;
    }

    .breadcrumbs a {
      color: var(--accent);
      text-decoration: none;
    }

    .breadcrumbs a:hover {
      text-decoration: underline;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .title-block h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0.03em;
      font-weight: 600;
      color: #e5e7eb;
    }

    .title-block p {
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--text-soft);
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .btn {
      border-radius: 999px;
      border: 1px solid var(--border-subtle);
      padding: 6px 12px;
      font-size: 12px;
      background: var(--bg-card);
      color: var(--text-main);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      transition: background-color 120ms ease, border-color 120ms ease, transform 80ms ease;
    }

    .btn-primary {
      border-color: transparent;
      background: linear-gradient(135deg, #4f46e5, #22c55e);
      color: white;
      box-shadow:
        0 10px 22px rgba(79, 70, 229, 0.5),
        0 0 0 1px rgba(15, 23, 42, 0.9);
    }

    .btn-danger {
      border-color: rgba(248, 113, 113, 0.9);
      color: #fecaca;
    }

    .btn:hover {
      background: #f3f4f6;
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .toolbar {
      margin-bottom: 14px;
      padding: 10px 11px;
      border-radius: 16px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-card);
      font-size: 12px;
      color: var(--text-soft);
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 6px;
    }

    .toolbar input,
    .toolbar select,
    .toolbar textarea {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: #ffffff;
      color: var(--text-main);
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      min-width: 80px;
    }

    .toolbar textarea {
      border-radius: 10px;
      min-width: 180px;
      min-height: 40px;
      resize: vertical;
    }

    .task-list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 320px;
      overflow-y: auto;
    }

    .task-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 7px 8px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: #ffffff;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .task-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .task-title {
      font-weight: 500;
      color: #e5e7eb;
    }

    .task-badges {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 4px;
      font-size: 10px;
    }

    .badge {
      border-radius: 999px;
      padding: 2px 7px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      color: var(--text-soft);
    }

    .badge-status-in-progress {
      border-color: rgba(56, 189, 248, 0.9);
      color: #e0f2fe;
      background: rgba(15, 23, 42, 0.9);
    }

    .badge-status-waiting {
      border-color: rgba(251, 191, 36, 0.9);
      color: #fef9c3;
      background: rgba(15, 23, 42, 0.9);
    }

    .badge-status-done {
      border-color: rgba(34, 197, 94, 0.9);
      color: #bbf7d0;
      background: rgba(15, 23, 42, 0.9);
    }

    .task-secondary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      color: var(--text-soft);
      font-size: 11px;
      margin-top: 2px;
    }

    .task-secondary span {
      white-space: nowrap;
    }

    .overdue-label {
      color: #fecaca;
      font-weight: 500;
    }

    .task-notes {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .task-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 11px;
    }

    .task-link:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-soft);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    @media (max-width: 720px) {
      .shell {
        padding: 18px 14px 14px;
        border-radius: 22px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="layout">
      <aside class="sidebar-nav">
        <div class="sidebar-title">Navigation</div>
        <ul class="nav-list">
          <li><a class="nav-link" href="index.html"><span class="dot"></span> Investor dashboard</a></li>
          <li><a class="nav-link" href="main.html"><span class="dot"></span> Deals overview</a></li>
          <li><a class="nav-link" href="tasks.html"><span class="dot"></span> Tasks by owner</a></li>
          <li><a class="nav-link active" href="javascript:void(0)"><span class="dot"></span> This person</a></li>
        </ul>
      </aside>

      <div class="main-column">
        <div class="breadcrumbs">
          <a href="tasks.html">Owner tasks</a> / <span id="crumb-owner">Person</span>
        </div>

        <div class="header">
          <div class="title-block">
            <h1 id="person-name">Person</h1>
            <p id="person-subtitle">Tasks and deals for this owner.</p>
          </div>
          <div class="header-actions">
            <button class="btn" type="button" onclick="window.location.href='main.html'">
              Back to deals
            </button>
            <button class="btn-danger btn" type="button" onclick="removePerson()">
              Remove person (and tasks)
            </button>
          </div>
        </div>

        <div class="toolbar">
          <span style="font-weight:500; color:var(--text-main);">Add / edit task for this person</span>
          <form id="person-task-form">
            <input type="hidden" id="edit-task-id" />
            <div class="toolbar-row">
              <label>
                Deal
                <select id="person-task-deal">
                  <option value="">(General)</option>
                </select>
              </label>
              <label style="flex:1 1 180px;">
                Title
                <input type="text" id="person-task-title" required placeholder="Task title" />
              </label>
              <label>
                Type
                <input type="text" id="person-task-type" placeholder="e.g. Call, Doc" />
              </label>
            </div>
            <div class="toolbar-row">
              <label>
                Status
                <select id="person-task-status">
                  <option value="in progress">In progress</option>
                  <option value="waiting">Waiting</option>
                  <option value="done">Done</option>
                </select>
              </label>
              <label>
                Due
                <input type="date" id="person-task-due" />
              </label>
              <label style="flex:1 1 200px;">
                Notes
                <textarea id="person-task-notes" placeholder="Optional notes"></textarea>
              </label>
              <button class="btn-primary btn" type="submit">
                Save task
              </button>
            </div>
          </form>
        </div>

        <ul class="task-list" id="person-task-list">
          <!-- JS injected -->
        </ul>

        <div class="footer">
          <span id="person-footer-meta"></span>
          <span>Use edit/delete to maintain this person's tasks.</span>
        </div>
      </div>
    </div>
  </div>

  <script src="deals.js"></script>
  <script src="tasks.js"></script>
  <script>
    const TASKS_STORAGE_KEY = "owner_tasks_v1";
    let tasks = [];
    let personName = "";

    function loadTasksData() {
      try {
        const raw = localStorage.getItem(TASKS_STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) {
            tasks = parsed;
            return;
          }
        }
      } catch (e) {
        console.warn("Failed to load tasks from storage", e);
      }
      tasks = Array.isArray(TASKS) ? JSON.parse(JSON.stringify(TASKS)) : [];
    }

    function saveTasksData() {
      try {
        localStorage.setItem(TASKS_STORAGE_KEY, JSON.stringify(tasks));
      } catch (e) {
        console.warn("Failed to save tasks to storage", e);
      }
    }

    function statusClass(status) {
      const s = String(status || "").toLowerCase();
      if (s === "in progress") return "badge-status-in-progress";
      if (s === "waiting") return "badge-status-waiting";
      if (s === "done") return "badge-status-done";
      return "";
    }

    function formatDate(d) {
      if (!d) return "No due date";
      const dt = new Date(d);
      if (isNaN(dt.getTime())) return d;
      return dt.toLocaleDateString("en-GB", { day: "2-digit", month: "short" });
    }

    function renderPersonTasks() {
      const list = document.getElementById("person-task-list");
      const footer = document.getElementById("person-footer-meta");
      const filtered = tasks.filter(t => (t.owner || "") === personName);

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      filtered.sort((a, b) => {
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1;
        if (!b.dueDate) return -1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      });

      list.innerHTML = "";
      let overdueCount = 0;

      const itemsHtml = filtered.map(task => {
        const deal = Array.isArray(DEALS) && task.dealId
          ? DEALS.find(d => d.id === task.dealId)
          : null;
        const status = String(task.status || "").toLowerCase();
        const statusLabel = status ? status.charAt(0).toUpperCase() + status.slice(1) : "In progress";
        const dealLabel = deal ? (deal.name || deal.company || "View deal") : "General";
        const dealLink = deal ? `deal.html?id=${encodeURIComponent(deal.id)}` : null;

        let overdue = false;
        if (task.dueDate && status !== "done") {
          const d = new Date(task.dueDate);
          if (!isNaN(d.getTime())) {
            d.setHours(0, 0, 0, 0);
            overdue = d < today;
          }
        }
        if (overdue) overdueCount++;

        return `
          <li class="task-item">
            <div class="task-title-row">
              <span class="task-title">${task.title || "Task"}</span>
              <div class="task-badges">
                <span class="badge ${statusClass(status)}">${statusLabel}</span>
                ${task.type ? `<span class="badge">${task.type}</span>` : ""}
              </div>
            </div>
            <div class="task-secondary">
              <span>${formatDate(task.dueDate)}${overdue ? ' · <span class="overdue-label">Overdue</span>' : ''}</span>
              <span>${deal ? (deal.company || "") : ""}</span>
              ${dealLink ? `<a class="task-link" href="${dealLink}">${dealLabel}</a>` : ""}
              <a class="task-link" href="javascript:void(0)" onclick="startEditTask('${task.id}')">Edit</a>
              <a class="task-link" href="javascript:void(0)" onclick="deleteTask('${task.id}')">Delete</a>
            </div>
            ${task.notes ? `<div class="task-notes">${task.notes}</div>` : ""}
          </li>
        `;
      }).join("");

      list.innerHTML = itemsHtml || "<li class=\"task-item\"><span class=\"task-notes\">No tasks yet for this person.</span></li>";

      const openCount = filtered.filter(t => String(t.status || "").toLowerCase() !== "done").length;
      footer.textContent =
        `${openCount} open · ${overdueCount} overdue · ${filtered.length} total task${filtered.length === 1 ? "" : "s"} for this person.`;
    }

    function setupForm() {
      const form = document.getElementById("person-task-form");
      const editIdInput = document.getElementById("edit-task-id");
      const dealSelect = document.getElementById("person-task-deal");
      const titleInput = document.getElementById("person-task-title");
      const typeInput = document.getElementById("person-task-type");
      const statusSelect = document.getElementById("person-task-status");
      const dueInput = document.getElementById("person-task-due");
      const notesInput = document.getElementById("person-task-notes");

      // Populate deals
      if (Array.isArray(DEALS)) {
        DEALS.forEach(d => {
          const opt = document.createElement("option");
          opt.value = d.id;
          opt.textContent = d.name || d.company || d.id;
          dealSelect.appendChild(opt);
        });
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const title = titleInput.value.trim();
        if (!title) return;

        const editingId = editIdInput.value;
        if (editingId) {
          const idx = tasks.findIndex(t => t.id === editingId);
          if (idx !== -1) {
            tasks[idx] = {
              ...tasks[idx],
              owner: personName,
              dealId: dealSelect.value || null,
              title,
              type: typeInput.value.trim() || "",
              status: statusSelect.value || "in progress",
              dueDate: dueInput.value || "",
              notes: notesInput.value.trim() || "",
            };
          }
        } else {
          const newTask = {
            id: `t-${Date.now()}-${Math.floor(Math.random() * 1000)}`,
            owner: personName,
            dealId: dealSelect.value || null,
            title,
            type: typeInput.value.trim() || "",
            status: statusSelect.value || "in progress",
            dueDate: dueInput.value || "",
            notes: notesInput.value.trim() || "",
          };
          tasks.push(newTask);
        }

        saveTasksData();
        editIdInput.value = "";
        titleInput.value = "";
        typeInput.value = "";
        notesInput.value = "";
        dueInput.value = "";
        statusSelect.value = "in progress";
        renderPersonTasks();
      });
    }

    function startEditTask(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      const editIdInput = document.getElementById("edit-task-id");
      const dealSelect = document.getElementById("person-task-deal");
      const titleInput = document.getElementById("person-task-title");
      const typeInput = document.getElementById("person-task-type");
      const statusSelect = document.getElementById("person-task-status");
      const dueInput = document.getElementById("person-task-due");
      const notesInput = document.getElementById("person-task-notes");

      editIdInput.value = task.id;
      dealSelect.value = task.dealId || "";
      titleInput.value = task.title || "";
      typeInput.value = task.type || "";
      statusSelect.value = task.status || "in progress";
      dueInput.value = task.dueDate || "";
      notesInput.value = task.notes || "";
    }

    function deleteTask(taskId) {
      tasks = tasks.filter(t => t.id !== taskId);
      saveTasksData();
      renderPersonTasks();
    }

    function removePerson() {
      if (!personName) return;
      if (!confirm(`Remove ${personName} and all their tasks?`)) return;
      tasks = tasks.filter(t => (t.owner || "") !== personName);
      saveTasksData();
      window.location.href = "tasks.html";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const owner = params.get("owner");
      personName = owner || "";

      loadTasksData();

      const crumb = document.getElementById("crumb-owner");
      const nameEl = document.getElementById("person-name");
      const subtitle = document.getElementById("person-subtitle");
      if (personName) {
        crumb.textContent = personName;
        nameEl.textContent = personName;
        subtitle.textContent = `Tasks and deals owned by ${personName}.`;
      } else {
        crumb.textContent = "Unknown";
        nameEl.textContent = "Unknown person";
        subtitle.textContent = "No owner was specified in the URL.";
      }

      setupForm();
      renderPersonTasks();
    });
  </script>
</body>

</html>

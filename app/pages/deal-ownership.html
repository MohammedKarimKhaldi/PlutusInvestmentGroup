<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deal Ownership / Staffing Dashboard</title>
    <!-- Premium Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/investor-dashboard.css" />
    <script src="../scripts/shared/app-config.js"></script>
    <!-- SheetJS for Excel Parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <!-- Chart.js for Visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="../scripts/shared/sharedrive-gate.js"></script>
</head>

<body data-page-id="deal-ownership">

    <!-- Initial Loader -->
    <div id="loader">
        <div id="loading-spinner">
            <div class="spinner"></div>
            <p id="loader-msg" style="font-weight: 500; color: var(--text-main);">Syncing Staffing Data...</p>
        </div>

        <div id="error-panel" style="display:none;">
            <div style="font-size: 2rem; margin-bottom: 15px;">📡</div>
            <h3 style="margin-bottom: 10px;">Cloud Sync Blocked</h3>
            <p id="error-details" style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 25px;">
                Unable to reach the SharePoint staffing file.
            </p>
            <button class="btn btn-ghost" id="btn-retry-sync" type="button">
                🔄 Try Connecting Again
            </button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="shell">
        <div class="layout">
            <aside class="sidebar-nav" data-sidebar-nav></aside>
            <div class="main-column" id="dashboard" style="display:none;">
                <header class="dashboard-hero">
                    <div class="dashboard-hero-copy">
                        <div class="dashboard-eyebrow">Ownership Dashboard</div>
                        <h1 id="dashboard-title" style="font-size: 2.25rem; font-weight: 700; letter-spacing: -0.02em;">
                            Deal Ownership
                        </h1>
                        <p id="dashboard-subtitle" style="color: var(--text-dim); font-size: 1rem;">
                            Live Staffing & Resource Allocation
                        </p>
                    </div>
                    <div class="header-right dashboard-hero-actions">
                        <div class="status-badge">
                            <div class="status-dot"></div>
                            <span id="sync-type">Cloud Sync Active</span>
                        </div>
                    </div>
                </header>

                <div class="kpi-grid dashboard-kpis" id="staffing-kpis">
                    <!-- Dynamic KPIs based on headers -->
                </div>

                <div class="chart-grid dashboard-chart-grid">
                    <div class="card-panel">
                        <div class="card-title">Staff Allocation</div>
                        <div style="height: 300px;"><canvas id="staffChart"></canvas></div>
                    </div>
                    <div class="card-panel">
                        <div class="card-title">Coverage Health</div>
                        <div style="height: 300px;"><canvas id="dealChart"></canvas></div>
                    </div>
                </div>

                <div class="card-panel ownership-watchlist" id="ownership-watchlist">
                    <!-- JS Injected -->
                </div>

                <div class="toolbar dashboard-inline-toolbar ownership-filter-bar" style="margin-top:20px; padding: 15px;">
                    <div class="toolbar-row ownership-filter-row">
                        <input type="text" class="search-box ownership-search" id="search" style="margin-bottom:0;"
                            placeholder="Search by staff, deal, owner, or role...">
                        <label>
                            View
                            <select id="ownership-view-filter">
                                <option value="summary">Summary</option>
                                <option value="rows">Raw staffing rows</option>
                            </select>
                        </label>
                        <label>
                            Link status
                            <select id="ownership-link-filter">
                                <option value="all">All</option>
                                <option value="linked">Linked</option>
                                <option value="unlinked">Unlinked</option>
                                <option value="missing-staffing">Needs staffing</option>
                            </select>
                        </label>
                        <label>
                            Coverage
                            <select id="ownership-coverage-filter">
                                <option value="all">All</option>
                                <option value="healthy">Healthy</option>
                                <option value="risk">At risk</option>
                            </select>
                        </label>
                        <label>
                            Stage
                            <select id="ownership-stage-filter">
                                <option value="all">All stages</option>
                                <option value="prospect">Prospect</option>
                                <option value="signing">Signing</option>
                                <option value="onboarding">Onboarding</option>
                                <option value="contacting investors">Contacting investors</option>
                            </select>
                        </label>
                        <button class="btn" id="ownership-reset-filters" type="button">Reset filters</button>
                    </div>
                    <div class="composition-caption" id="ownership-filter-summary">Showing all coverage rows.</div>
                </div>

                <div class="table-wrap dashboard-table-wrap">
                    <table id="data-table">
                        <thead id="table-head">
                            <!-- JS Injected -->
                        </thead>
                        <tbody id="table-body">
                            <!-- JS Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../scripts/shared/layout.js"></script>
    <script src="../scripts/shared/data-loader.js"></script>
    <script src="../scripts/shared/core.js"></script>
    <script src="../scripts/pages/deal-ownership.js"></script>
    <script src="../scripts/shared/theme.js"></script>
</body>

</html>

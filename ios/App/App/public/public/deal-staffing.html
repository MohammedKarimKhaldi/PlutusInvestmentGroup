<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deal Staffing</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/deal-staffing.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="../data/config.js"></script>
</head>
<body>
  <div class="shell">
    <div class="layout">
      <aside class="sidebar-nav">
        <div class="sidebar-title">Navigation</div>
        <ul class="nav-list">
          <li><a class="nav-link" href="investor-dashboard.html"><span class="dot"></span> Investor dashboard</a></li>
          <li><a class="nav-link active" href="deal-staffing.html"><span class="dot"></span> Deal staffing</a></li>
          <li><a class="nav-link" href="deals-overview.html"><span class="dot"></span> Deals overview</a></li>
          <li><a class="nav-link" href="tasks-management.html"><span class="dot"></span> Tasks by owner</a></li>
          <li><a class="nav-link" href="sharedrive-folders.html"><span class="dot"></span> Sharedrive folders</a></li>
        </ul>
      </aside>

      <div class="main-column">
        <header class="page-header">
          <div>
            <h1>Deal Staffing</h1>
            <p class="subtitle">Auto-synced staffing snapshot from SharePoint Excel</p>
          </div>
          <div class="header-actions">
            <button class="btn btn-ghost" id="btn-refresh" type="button">Refresh</button>
            <span class="sync-pill" id="sync-status">Syncing...</span>
          </div>
        </header>

        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-label">Total Rows</div>
            <div class="kpi-value" id="k-total-rows">0</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Unique Deals</div>
            <div class="kpi-value" id="k-unique-deals">0</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Open Roles</div>
            <div class="kpi-value" id="k-open-roles">0</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Last Sync</div>
            <div class="kpi-value kpi-small" id="k-last-sync">—</div>
          </div>
        </div>

        <div class="toolbar">
          <input class="search-box" id="search" type="text" placeholder="Search staffing rows..." />
          <select class="dashboard-select" id="sheet-select"></select>
        </div>

        <div class="table-wrap">
          <table id="staffing-table">
            <thead id="staffing-head"></thead>
            <tbody id="staffing-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../scripts/shared/core.js"></script>
  <script src="../scripts/pages/deal-staffing.js"></script>
  <script src="../scripts/shared/theme.js"></script>
</body>
</html>

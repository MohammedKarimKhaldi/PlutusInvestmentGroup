site_name: Plutus Investment Group Dashboard
site_description: Architecture, operations, and maintenance documentation for the Plutus dashboard codebase.
theme:
  name: readthedocs

docs_dir: docs

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Architecture:
      - System Overview: architecture/system-overview.md
      - Repository Layout: architecture/repository-layout.md
      - Browser Runtime: architecture/browser-runtime.md
      - Desktop Bridge: architecture/desktop-bridge.md
  - Product:
      - Pages: product/pages.md
      - Configuration: product/configuration.md
      - Sharedrive Sync: product/sharedrive-sync.md
  - Operations:
      - Build and Deployment: operations/build-and-deployment.md
      - Documentation Site: operations/documentation-site.md

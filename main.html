<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Deals Overview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f5f7;
      --bg-elevated: #ffffff;
      --bg-card: #f9fafb;
      --border-subtle: rgba(148, 163, 184, 0.35);
      --border-strong: rgba(148, 163, 184, 0.6);
      --text-main: #0f172a;
      --text-soft: #6b7280;
      --accent: #4f46e5;
      --accent-soft: rgba(79, 70, 229, 0.12);
      --accent-soft-stronger: rgba(79, 70, 229, 0.2);
      --danger: #f97373;
      --success: #16a34a;
      --warning: #eab308;
      --chip-bg: #eef2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background:
        radial-gradient(circle at top, rgba(79, 70, 229, 0.05), transparent 55%),
        radial-gradient(circle at bottom, rgba(37, 99, 235, 0.04), transparent 55%),
        var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 40px;
    }

    .shell {
      width: 100%;
      max-width: 1120px;
      border-radius: 20px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
      box-shadow:
        0 18px 35px rgba(15, 23, 42, 0.08);
      padding: 22px 22px 18px;
      position: relative;
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 18px;
      align-items: flex-start;
    }

    .sidebar-nav {
      border-radius: 16px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-card);
      padding: 10px 10px 8px;
      font-size: 12px;
      color: var(--text-soft);
    }

    .sidebar-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 8px;
      color: var(--text-soft);
    }

    .nav-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 12px;
      color: var(--text-soft);
      text-decoration: none;
      background: transparent;
      cursor: pointer;
      transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease, transform 80ms ease;
    }

    .nav-link span.dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      opacity: 0.65;
    }

    .nav-link:hover {
      background: #eef2ff;
      border-color: rgba(129, 140, 248, 0.7);
      color: #312e81;
      transform: translateY(-1px);
    }

    .nav-link.active {
      background: #e0e7ff;
      border-color: rgba(79, 70, 229, 0.9);
      color: #1e1b4b;
    }

    .main-column {
      min-width: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .title-block h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0.03em;
      font-weight: 600;
      color: #e5e7eb;
    }

    .title-block p {
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--text-soft);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pill {
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: var(--bg-card);
      color: var(--text-soft);
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .pill span.dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.9);
    }

    .btn-primary {
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      background: linear-gradient(135deg, #4f46e5, #22c55e);
      color: white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow:
        0 14px 30px rgba(79, 70, 229, 0.55),
        0 0 0 1px rgba(15, 23, 42, 0.8);
      white-space: nowrap;
    }

    .btn-primary:hover {
      filter: brightness(1.05);
      transform: translateY(-0.5px);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .chip {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--bg-card);
      border: 1px solid rgba(148, 163, 184, 0.35);
      color: var(--text-soft);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .chip strong {
      font-weight: 500;
      color: #e5e7eb;
    }

    .stage-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
    }

    .stage-prospect {
      background: var(--warning);
      box-shadow: 0 0 8px rgba(251, 191, 36, 0.7);
    }

    .stage-onboarding {
      background: #38bdf8;
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.7);
    }

    .stage-contacting {
      background: var(--success);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
    }

    .table-wrap {
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: var(--bg-card);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background: #f3f4f6;
    }

    th,
    td {
      padding: 10px 14px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-soft);
      border-bottom: 1px solid rgba(51, 65, 85, 0.9);
    }

    tbody tr:nth-child(even) {
      background: #ffffff;
    }

    tbody tr:nth-child(odd) {
      background: #f9fafb;
    }

    tbody tr:hover {
      background: rgba(31, 41, 55, 0.95);
    }

    td {
      border-bottom: 1px solid rgba(30, 41, 59, 0.95);
    }

    td.name-cell {
      font-weight: 500;
      color: #e5e7eb;
    }

    .stage-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      text-transform: capitalize;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.95);
      color: var(--text-soft);
    }

    .action-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
    }

    .action-link:hover {
      text-decoration: underline;
    }

    .amount {
      font-variant-numeric: tabular-nums;
    }

    .amount-unknown {
      color: #fb7185;
      font-weight: 500;
    }

    .footer {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--text-soft);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 720px) {
      .shell {
        padding: 18px 16px 18px;
        border-radius: 24px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      th:nth-child(5),
      th:nth-child(6),
      th:nth-child(7),
      th:nth-child(8),
      th:nth-child(9),
      td:nth-child(5),
      td:nth-child(6),
      td:nth-child(7),
      td:nth-child(8),
      td:nth-child(9) {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="layout">
      <aside class="sidebar-nav">
        <div class="sidebar-title">Navigation</div>
        <ul class="nav-list">
          <li><a class="nav-link" href="index.html"><span class="dot"></span> Investor dashboard</a></li>
          <li><a class="nav-link active" href="main.html"><span class="dot"></span> Deals overview</a></li>
          <li><a class="nav-link" href="tasks.html"><span class="dot"></span> Tasks by owner</a></li>
        </ul>
      </aside>

      <div class="main-column">
        <div class="header">
          <div class="title-block">
            <h1>Deal Pipeline</h1>
            <p>High-level view of all active deals and their current step.</p>
          </div>
          <div class="header-actions">
            <div class="pill">
              <span class="dot"></span>
              <span>Live overview</span>
            </div>
            <button class="btn-primary" type="button" onclick="window.location.href='index.html'">
              Open Investor Dashboard
            </button>
            <button class="btn" type="button" onclick="window.location.href='tasks.html'">
              View owner tasks
            </button>
          </div>
        </div>

        <div class="meta-row" id="meta-row">
          <!-- Filled by JS: counts per stage, totals -->
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Deal</th>
                <th>Company</th>
                <th>Stage</th>
                <th>Owner</th>
                <th>Target</th>
                <th>Raised</th>
                <th>Cash %</th>
                <th>Equity %</th>
                <th>Retainer</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="deals-body">
              <!-- JS injected -->
            </tbody>
          </table>
        </div>

        <div class="footer">
          <span id="footer-meta"></span>
          <span>
            View any deal to see details, or
            <a href="index.html">open fundraising dashboard</a>.
          </span>
        </div>
      </div>
    </div>
  </div>

  <script src="deals.js"></script>
  <script>
    const STAGE_LABELS = {
      "prospect": "Prospect",
      "onboarding": "Onboarding",
      "contacting investors": "Contacting investors"
    };

    function formatAmountCell(amount, currency) {
      if (amount == null || amount === "") {
        return `<span class="amount-unknown">??</span>`;
      }
      if (typeof amount === "string") {
        return amount;
      }
      if (typeof amount === "number" && !isNaN(amount)) {
        try {
          const formatted = new Intl.NumberFormat("en-US", {
            style: "currency",
            currency: currency || "USD",
            maximumFractionDigits: 0
          }).format(amount);
          return formatted;
        } catch {
          return `${currency || "USD"} ${Number(amount).toLocaleString()}`;
        }
      }
      return `<span class="amount-unknown">??</span>`;
    }

    function stageClass(stage) {
      const s = String(stage || "").toLowerCase();
      if (s === "prospect") return "stage-prospect";
      if (s === "onboarding") return "stage-onboarding";
      if (s === "contacting investors") return "stage-contacting";
      return "stage-prospect";
    }

    function renderDeals() {
      const body = document.getElementById("deals-body");
      const metaRow = document.getElementById("meta-row");
      const footerMeta = document.getElementById("footer-meta");
      if (!Array.isArray(DEALS)) return;

      body.innerHTML = "";

      let counts = {
        total: DEALS.length,
        prospect: 0,
        onboarding: 0,
        contacting: 0
      };

      const formatTextOrUnknown = (value) => {
        if (value == null || String(value).trim() === "") {
          return `<span class="amount-unknown">??</span>`;
        }
        return String(value);
      };

      DEALS.forEach(deal => {
        const tr = document.createElement("tr");
        const stage = String(deal.stage || "").toLowerCase();
        if (stage === "prospect") counts.prospect++;
        else if (stage === "onboarding") counts.onboarding++;
        else if (stage === "contacting investors") counts.contacting++;

        tr.innerHTML = `
          <td class="name-cell">${deal.name || "–"}</td>
          <td>${deal.company || "–"}</td>
          <td>
            <span class="stage-badge">
              <span class="stage-dot ${stageClass(stage)}"></span>
              ${STAGE_LABELS[stage] || "Prospect"}
            </span>
          </td>
          <td>${deal.owner || "–"}</td>
          <td class="amount">${formatAmountCell(deal.targetAmount, deal.currency)}</td>
          <td class="amount">${formatAmountCell(deal.raisedAmount, deal.currency)}</td>
          <td>${formatTextOrUnknown(deal.CashCommission)}</td>
          <td>${formatTextOrUnknown(deal.EquityCommission)}</td>
          <td>${formatTextOrUnknown(deal.Retainer)}</td>
          <td>
            <a class="action-link" href="deal.html?id=${encodeURIComponent(deal.id)}">View deal</a>
          </td>
        `;

        body.appendChild(tr);
      });

      metaRow.innerHTML = "";
      const chips = [
        { label: "Total deals", value: counts.total },
        { label: "Prospect", value: counts.prospect },
        { label: "Onboarding", value: counts.onboarding },
        { label: "Contacting investors", value: counts.contacting },
      ];

      chips.forEach(ch => {
        const div = document.createElement("div");
        div.className = "chip";
        div.innerHTML = `<strong>${ch.value}</strong> ${ch.label}`;
        metaRow.appendChild(div);
      });

      footerMeta.textContent = `${counts.total} active deal${counts.total === 1 ? "" : "s"} in pipeline.`;
    }

    document.addEventListener("DOMContentLoaded", renderDeals);
  </script>
</body>

</html>

name: Mac App Store Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-mas:
    name: Build MAS (${{ matrix.arch }})
    runs-on: macos-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm64
          - x64

    env:
      CSC_LINK: ${{ runner.temp }}/apple-mas-app-signing.p12
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_MAS_APP_CERT_PASSWORD }}
      CSC_INSTALLER_LINK: ${{ runner.temp }}/apple-mas-installer-signing.p12
      CSC_INSTALLER_KEY_PASSWORD: ${{ secrets.APPLE_MAS_INSTALLER_CERT_PASSWORD }}
      MAS_PROVISIONING_PROFILE_PATH: ${{ runner.temp }}/plutus-mas.provisionprofile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate signing secrets
        env:
          APPLE_MAS_APP_CERT_BASE64: ${{ secrets.APPLE_MAS_APP_CERT_BASE64 }}
          APPLE_MAS_APP_CERT_PASSWORD: ${{ secrets.APPLE_MAS_APP_CERT_PASSWORD }}
          APPLE_MAS_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_MAS_INSTALLER_CERT_BASE64 }}
          APPLE_MAS_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_MAS_INSTALLER_CERT_PASSWORD }}
          APPLE_MAS_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_MAS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          missing=0

          for name in \
            APPLE_MAS_APP_CERT_BASE64 \
            APPLE_MAS_APP_CERT_PASSWORD \
            APPLE_MAS_INSTALLER_CERT_BASE64 \
            APPLE_MAS_INSTALLER_CERT_PASSWORD \
            APPLE_MAS_PROVISIONING_PROFILE_BASE64
          do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub secret: ${name}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Write signing assets
        env:
          APPLE_MAS_APP_CERT_BASE64: ${{ secrets.APPLE_MAS_APP_CERT_BASE64 }}
          APPLE_MAS_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_MAS_INSTALLER_CERT_BASE64 }}
          APPLE_MAS_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_MAS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          outputs = {
              "APPLE_MAS_APP_CERT_BASE64": os.environ["CSC_LINK"],
              "APPLE_MAS_INSTALLER_CERT_BASE64": os.environ["CSC_INSTALLER_LINK"],
              "APPLE_MAS_PROVISIONING_PROFILE_BASE64": os.environ["MAS_PROVISIONING_PROFILE_PATH"],
          }

          for env_name, destination in outputs.items():
              Path(destination).write_bytes(base64.b64decode(os.environ[env_name]))
          PY

      - name: Install dependencies
        run: npm install

      - name: Build Mac App Store package
        run: |
          set -euo pipefail
          npm run web:prepare
          npx electron-builder --mac mas --${{ matrix.arch }} --publish never \
            -c.mas.provisioningProfile="${MAS_PROVISIONING_PROFILE_PATH}"

      - name: Locate MAS package
        id: locate_pkg
        run: |
          set -euo pipefail
          pkg_path="$(find dist -maxdepth 1 -name "*-mas-${{ matrix.arch }}.pkg" -print -quit)"
          if [ -z "${pkg_path}" ]; then
            echo "No Mac App Store package was produced."
            exit 1
          fi
          echo "pkg_path=${pkg_path}" >> "$GITHUB_OUTPUT"

      - name: Upload MAS package artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app-store-${{ matrix.arch }}
          path: ${{ steps.locate_pkg.outputs.pkg_path }}
          if-no-files-found: error

name: Mac GitHub Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: mac-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build Notarized Mac Release
    runs-on: macos-latest
    permissions:
      contents: write

    env:
      CSC_LINK: ${{ github.workspace }}/.github-tmp/apple-dev-id-application.p12
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_DEV_ID_APP_CERT_PASSWORD }}
      CSC_NAME: "Mohammed-Karim Khaldi (8574X8NBPZ)"
      APPLE_API_KEY_PATH: ${{ github.workspace }}/.github-tmp/AuthKey_GitHubRelease.p8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate signing and notarization secrets
        id: validate
        env:
          APPLE_DEV_ID_APP_CERT_BASE64: ${{ secrets.APPLE_DEV_ID_APP_CERT_BASE64 }}
          APPLE_DEV_ID_APP_CERT_PASSWORD: ${{ secrets.APPLE_DEV_ID_APP_CERT_PASSWORD }}
          APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_ISSUER: ${{ secrets.APPLE_NOTARY_API_ISSUER }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail

          missing=0
          for name in APPLE_DEV_ID_APP_CERT_BASE64 APPLE_DEV_ID_APP_CERT_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub secret: ${name}"
              missing=1
            fi
          done

          has_api_key_auth=0
          has_apple_id_auth=0
          if [ -n "${APPLE_NOTARY_API_KEY_BASE64:-}" ] && [ -n "${APPLE_NOTARY_API_KEY_ID:-}" ]; then
            has_api_key_auth=1
          fi

          if [ -n "${APPLE_NOTARY_APPLE_ID:-}" ] && [ -n "${APPLE_NOTARY_APP_PASSWORD:-}" ] && [ -n "${APPLE_NOTARY_TEAM_ID:-}" ]; then
            has_apple_id_auth=1
          fi

          if [ "${has_api_key_auth}" -eq 1 ]; then
            echo "notary_mode=api-key" >> "$GITHUB_OUTPUT"
          elif [ "${has_apple_id_auth}" -eq 1 ]; then
            echo "notary_mode=apple-id" >> "$GITHUB_OUTPUT"
          fi

          if [ "${has_api_key_auth}" -eq 0 ] && [ "${has_apple_id_auth}" -eq 0 ]; then
            echo "Missing notarization credentials."
            echo "Provide either APPLE_NOTARY_API_KEY_BASE64 + APPLE_NOTARY_API_KEY_ID (+ APPLE_NOTARY_API_ISSUER for Team keys)"
            echo "or APPLE_NOTARY_APPLE_ID + APPLE_NOTARY_APP_PASSWORD + APPLE_NOTARY_TEAM_ID."
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Write Developer ID certificate
        env:
          APPLE_DEV_ID_APP_CERT_BASE64: ${{ secrets.APPLE_DEV_ID_APP_CERT_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$CSC_LINK")"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CSC_LINK"]).write_bytes(base64.b64decode(os.environ["APPLE_DEV_ID_APP_CERT_BASE64"]))
          PY

      - name: Configure notarization with App Store Connect API key
        if: steps.validate.outputs.notary_mode == 'api-key'
        env:
          APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_ISSUER: ${{ secrets.APPLE_NOTARY_API_ISSUER }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["APPLE_API_KEY_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_NOTARY_API_KEY_BASE64"]))
          PY
          {
            echo "APPLE_API_KEY=${APPLE_API_KEY_PATH}"
            echo "APPLE_API_KEY_ID=${APPLE_NOTARY_API_KEY_ID}"
          } >> "$GITHUB_ENV"
          if [ -n "${APPLE_NOTARY_API_ISSUER:-}" ]; then
            echo "APPLE_API_ISSUER=${APPLE_NOTARY_API_ISSUER}" >> "$GITHUB_ENV"
          fi

      - name: Configure notarization with Apple ID
        if: steps.validate.outputs.notary_mode == 'apple-id'
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail
          {
            echo "APPLE_ID=${APPLE_NOTARY_APPLE_ID}"
            echo "APPLE_APP_SPECIFIC_PASSWORD=${APPLE_NOTARY_APP_PASSWORD}"
            echo "APPLE_TEAM_ID=${APPLE_NOTARY_TEAM_ID}"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build signed Mac DMG
        env:
          APPLE_API_KEY: ""
          APPLE_API_KEY_ID: ""
          APPLE_API_ISSUER: ""
          APPLE_ID: ""
          APPLE_APP_SPECIFIC_PASSWORD: ""
          APPLE_TEAM_ID: ""
        run: |
          set -euo pipefail
          npm run web:prepare
          npx electron-builder --mac dmg --universal --publish never

      - name: Notarize Mac DMG
        env:
          NOTARY_MODE: ${{ steps.validate.outputs.notary_mode }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_ISSUER: ${{ secrets.APPLE_NOTARY_API_ISSUER }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail
          dmg_path="$(find dist -maxdepth 1 -name "*-mac-universal.dmg" -print -quit)"
          if [ -z "${dmg_path}" ]; then
            echo "No universal DMG was produced."
            exit 1
          fi

          submit_args=(submit "${dmg_path}" --wait --timeout 30m)

          if [ "${NOTARY_MODE}" = "api-key" ]; then
            submit_args+=(--key "${APPLE_API_KEY_PATH}" --key-id "${APPLE_NOTARY_API_KEY_ID}")
            if [ -n "${APPLE_NOTARY_API_ISSUER:-}" ]; then
              submit_args+=(--issuer "${APPLE_NOTARY_API_ISSUER}")
            fi
          else
            submit_args+=(--apple-id "${APPLE_NOTARY_APPLE_ID}" --password "${APPLE_NOTARY_APP_PASSWORD}" --team-id "${APPLE_NOTARY_TEAM_ID}")
          fi

          xcrun notarytool "${submit_args[@]}"

      - name: Staple and validate notarized DMG
        run: |
          set -euo pipefail
          dmg_path="$(find dist -maxdepth 1 -name "*-mac-universal.dmg" -print -quit)"
          if [ -z "${dmg_path}" ]; then
            echo "No universal DMG was produced."
            exit 1
          fi

          xcrun stapler staple "${dmg_path}"
          xcrun stapler validate "${dmg_path}"

      - name: Upload Mac assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag_name="${GITHUB_REF_NAME}"
          dmg_path="$(find dist -maxdepth 1 -name "*-mac-universal.dmg" -print -quit)"
          if [ -z "${dmg_path}" ]; then
            echo "No universal DMG was produced."
            exit 1
          fi

          assets=("${dmg_path}")
          if [ -f "${dmg_path}.blockmap" ]; then
            assets+=("${dmg_path}.blockmap")
          fi

          gh release view "${tag_name}" >/dev/null 2>&1 || gh release create "${tag_name}" --title "${tag_name#v}" --notes ""
          gh release upload "${tag_name}" "${assets[@]}" --clobber

      - name: Upload Mac release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release-${{ github.sha }}
          path: |
            dist/*-mac-universal.dmg
            dist/*-mac-universal.dmg.blockmap
          if-no-files-found: error

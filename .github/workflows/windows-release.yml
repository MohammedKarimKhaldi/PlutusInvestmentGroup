name: Windows CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows Installer
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ github.sha }}
          path: |
            dist/*-win-x64.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  release-windows:
    name: Publish Windows Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Windows signing secrets
        env:
          WIN_SIGN_CERT_BASE64: ${{ secrets.WIN_SIGN_CERT_BASE64 }}
          WIN_SIGN_CERT_PASSWORD: ${{ secrets.WIN_SIGN_CERT_PASSWORD }}
        run: |
          $missing = @()

          if ([string]::IsNullOrWhiteSpace($env:WIN_SIGN_CERT_BASE64)) {
            $missing += "WIN_SIGN_CERT_BASE64"
          }

          if ([string]::IsNullOrWhiteSpace($env:WIN_SIGN_CERT_PASSWORD)) {
            $missing += "WIN_SIGN_CERT_PASSWORD"
          }

          if ($missing.Count -gt 0) {
            Write-Error ("Missing required GitHub secret(s): " + ($missing -join ", "))
            exit 1
          }

      - name: Write Windows signing certificate
        env:
          WIN_SIGN_CERT_BASE64: ${{ secrets.WIN_SIGN_CERT_BASE64 }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "windows-codesign.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WIN_SIGN_CERT_BASE64))
          "WIN_CSC_LINK=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and publish Windows release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_SIGN_CERT_PASSWORD }}
        run: npm run dist:win:publish

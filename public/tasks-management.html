<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Tasks by Owner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/tasks-management.css" />
</head>

<body>
  <div class="shell">
    <div class="layout">
      <aside class="sidebar-nav">
        <div class="sidebar-title">Navigation</div>
        <ul class="nav-list">
          <li><a class="nav-link" href="investor-dashboard.html"><span class="dot"></span> Investor dashboard</a></li>
          <li><a class="nav-link" href="deals-overview.html"><span class="dot"></span> Deals overview</a></li>
          <li><a class="nav-link active" href="tasks-management.html"><span class="dot"></span> Tasks by owner</a></li>
          <li><a class="nav-link" href="sharedrive-folders.html"><span class="dot"></span> Sharedrive folders</a></li>
        </ul>
      </aside>

      <div class="main-column">
        <div class="header modern-header">
          <div class="title-block">
            <h1>Owner Tasks</h1>
            <p>Control center for team workload, risk, and delivery momentum.</p>
          </div>
          <div class="header-actions">
            <div class="pill">
              <span class="dot"></span>
              <span>Live management view</span>
            </div>
            <div class="pill" id="sharedrive-status-pill">
              <span class="dot" id="sharedrive-status-dot"></span>
              <span id="sharedrive-status-text">Sharedrive: idle</span>
            </div>
            <a class="btn" href="deals-overview.html">Back to deals</a>
          </div>
        </div>

        <div class="management-kpis" id="management-kpis">
          <!-- JS injected -->
        </div>

        <div class="management-toolbar">
          <input class="management-search" id="owner-search" type="text" placeholder="Search owner, task, company..." />
          <select class="management-select" id="group-by">
            <option value="owner">Group by owner</option>
            <option value="deal">Group by deal</option>
            <option value="status">Group by status</option>
            <option value="type">Group by task type</option>
          </select>
          <select class="management-select" id="status-filter">
            <option value="all">All statuses</option>
            <option value="in progress">In progress</option>
            <option value="waiting">Waiting</option>
            <option value="done">Done</option>
            <option value="overdue">Overdue only</option>
          </select>
          <select class="management-select" id="owner-sort">
            <option value="workload">Sort: Highest workload</option>
            <option value="overdue">Sort: Most overdue</option>
            <option value="completion">Sort: Lowest completion</option>
            <option value="name">Sort: Name</option>
          </select>
          <label class="management-toggle">
            <input id="title-only" type="checkbox" />
            <span>Title-only cards</span>
          </label>
        </div>

        <details class="toolbar add-task-panel">
          <summary class="add-task-summary">+ Add task</summary>
          <form id="task-form">
            <div class="toolbar-row">
              <label>
                Owner
                <input type="text" id="task-owner" required placeholder="Owner" />
              </label>
              <label>
                Deal
                <select id="task-deal">
                  <option value="">(General)</option>
                </select>
              </label>
              <label>
                Title
                <input type="text" id="task-title" required placeholder="Task title" />
              </label>
              <label>
                Type
                <input type="text" id="task-type" placeholder="e.g. Call, Doc" />
              </label>
            </div>
            <div class="toolbar-row">
              <label>
                Status
                <select id="task-status">
                  <option value="in progress">In progress</option>
                  <option value="waiting">Waiting</option>
                  <option value="done">Done</option>
                </select>
              </label>
              <label>
                Due
                <input type="date" id="task-due" />
              </label>
              <label style="flex:1 1 200px;">
                Notes
                <textarea id="task-notes" placeholder="Optional notes"></textarea>
              </label>
              <button class="btn btn-primary" type="submit">
                Add task
              </button>
            </div>
          </form>
        </details>

        <div class="grid" id="owners-grid">
          <!-- JS injected -->
        </div>

        <div class="footer">
          <span id="footer-meta"></span>
          <span>
            Open a deal from the task link, or view the
            <a href="deals-overview.html">deal pipeline</a>.
          </span>
        </div>
      </div>
    </div>
  </div>

  <script src="../data/deals.js"></script>
  <script src="../data/tasks.js"></script>
  <script src="../data/sharedrive-tasks.js"></script>
  <script src="../scripts/shared/core.js"></script>
  <script src="../scripts/shared/theme.js"></script>
  <script src="../scripts/pages/tasks-management.js"></script>
</body>

</html>

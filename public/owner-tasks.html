<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Owner Tasks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/tasks-management.css" />
  <link rel="stylesheet" href="../styles/owner-tasks.css" />
</head>

<body>
  <div class="shell">
    <div class="layout">
      <aside class="sidebar-nav">
        <div class="sidebar-title">Navigation</div>
        <ul class="nav-list">
          <li><a class="nav-link" href="investor-dashboard.html"><span class="dot"></span> Investor dashboard</a></li>
          <li><a class="nav-link" href="deals-overview.html"><span class="dot"></span> Deals overview</a></li>
          <li><a class="nav-link active" href="tasks-management.html"><span class="dot"></span> Tasks by owner</a></li>
          <li><a class="nav-link" href="sharedrive-folders.html"><span class="dot"></span> Sharedrive folders</a></li>
        </ul>
      </aside>

      <div class="main-column">
        <div class="breadcrumbs">
          <a href="tasks-management.html">Tasks</a> / <span id="crumb-owner">Owner</span>
        </div>

        <div class="header">
          <div class="title-block">
            <h1 id="owner-title">Owner Tasks</h1>
            <p id="owner-subtitle">Focused task view by owner.</p>
          </div>
          <div class="header-actions">
            <div class="pill" id="sharedrive-status-pill">
              <span class="dot" id="sharedrive-status-dot"></span>
              <span id="sharedrive-status-text">Sharedrive: idle</span>
            </div>
            <a class="btn" href="investor-dashboard.html">Dashboard</a>
            <a class="btn" href="deals-overview.html">Deals</a>
            <a class="btn" href="tasks-management.html">Back to all owners</a>
          </div>
        </div>

        <div class="meta-row" id="owner-meta-row"></div>
        <div class="person-toolbar">
          <input class="person-search" id="task-search" type="text" placeholder="Search tasks, notes, deal..." />
          <div class="person-filters">
            <button class="person-filter active" type="button" data-view="all">All</button>
            <button class="person-filter" type="button" data-view="open">Open</button>
            <button class="person-filter" type="button" data-view="overdue">Overdue</button>
            <button class="person-filter" type="button" data-view="done">Done</button>
          </div>
          <div class="person-layouts">
            <button class="person-layout active" type="button" data-layout="grouped">Grouped</button>
            <button class="person-layout" type="button" data-layout="list">List</button>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span>Tasks</span>
            <span class="tasks-count" id="tasks-count">0 shown</span>
          </div>
          <div class="task-list" id="owner-task-list"></div>
          <div class="empty-state" id="owner-empty" style="display:none;">No tasks found for this owner.</div>
        </div>

        <div class="task-edit-modal" id="task-edit-modal" aria-hidden="true">
          <div class="task-edit-backdrop" data-action="close-task-edit"></div>
          <div class="task-edit-dialog" role="dialog" aria-modal="true" aria-labelledby="task-edit-title">
            <div class="task-edit-header">
              <h2 id="task-edit-title">Edit task</h2>
              <button class="task-edit-close" type="button" data-action="close-task-edit" aria-label="Close">×</button>
            </div>
            <form id="task-edit-form" class="task-edit-form">
              <label>
                Title
                <input type="text" id="edit-task-title" required />
              </label>
              <div class="task-edit-grid">
                <label>
                  Status
                  <select id="edit-task-status" required>
                    <option value="in progress">In progress</option>
                    <option value="waiting">Waiting</option>
                    <option value="done">Done</option>
                  </select>
                </label>
                <label>
                  Due date
                  <input type="date" id="edit-task-due" />
                </label>
              </div>
              <label>
                Type
                <input type="text" id="edit-task-type" placeholder="e.g. Meeting" />
              </label>
              <label>
                Notes
                <textarea id="edit-task-notes" rows="3" placeholder="Optional notes"></textarea>
              </label>
              <div class="task-edit-actions">
                <button class="btn" type="button" data-action="close-task-edit">Cancel</button>
                <button class="btn btn-primary" type="submit">Save changes</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../data/deals.js"></script>
  <script src="../data/tasks.js"></script>
  <script src="../data/sharedrive-tasks.js"></script>
  <script src="../scripts/shared/core.js"></script>
  <script src="../scripts/shared/theme.js"></script>
  <script src="../scripts/pages/owner-tasks.js"></script>
</body>

</html>
